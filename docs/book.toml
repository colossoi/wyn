[book]
title = "The Wyn Language Specification"
authors = ["Wyn Contributors"]
language = "en"
multilingual = false
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
# The book is served at /spec/ on the playground domain; setting
# site-url so internal links resolve correctly under that prefix.
site-url = "/spec/"
git-repository-url = "https://github.com/collosi/wyn"
edit-url-template = "https://github.com/collosi/wyn/edit/master/SPECIFICATION.md"
# Note on edit-url-template: every chapter's "Edit this page" link
# points back at the canonical SPECIFICATION.md, since the per-chapter
# files under src/ are auto-generated by scripts/split_spec.py.

[output.html.search]
enable = true
limit-results = 20
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
